<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Authors</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        margin: 0px;
      }
      #sidebar {
        width: 100%;
        max-width: 280px;
        height: 100vh;
        transition: 0.3s;
        border-right: #198754 solid 1px;
        z-index: 1001;
        position: fixed;
        top: 0;
        left: 0;
      }

      #sidebar.hide {
        margin-left: -280px;
      }
      .nav-item {
        margin-bottom: 20px;
      }
      .nav-link.active {
        background-color: #198754;
        border-radius: 8px;
      }
      .nav-link {
        transition: 0.3s;
        border-radius: 8px;
      }

      .nav-link:hover {
        background-color: #198754;
        color: white !important;
      }

      #navbar {
        position: fixed;
        top: 0;
        left: 280px;

        min-width: calc(100% - 280px);
        height: 60px;
        transition: 0.3s;
        z-index: 1000;
      }

      #navbar.full {
        left: 0;
        width: 100%;
      }
      .icon-box {
        padding: 8px;
        border-radius: 50%;
        cursor: pointer;
        transition: 0.3s;
      }

      .icon-box:hover {
        background-color: #198754;
      }

      #main {
        margin-left: 280px;
        margin-top: 60px;
        padding: 20px;
        transition: 0.3s;
      }

      #main.full {
        margin-left: 0;
      }

      .card {
        border-radius: 15px;
        overflow: hidden;
        transition: 0.3s;
        cursor: pointer;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .author-img {
        width: 100%;
        height: 220px;
      }

      .card-body {
        text-align: center;
      }
    </style>
  </head>

  <body class="overflow-x-hidden bg-dark">
    <div
      id="sidebar"
      class="position-fixed top-0 start-0 vh-100 bg-dark text-white d-flex flex-column p-2"
    >
      <div
        class="d-flex align-items-center justify-content-between gap-1 p-2"
        style="font-size: xx-large"
      >
        <div class="d-flex align-item-center gap-2">
          <i class="bi bi-chat-quote" style="color: lightgreen !important"></i>
          <span class="fw-bold">QuoteVerse</span>
        </div>
        <button
          class="btn btn-success mt-2 fs-6 d-lg-none"
          onclick="sidebartoggle()"
        >
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <ul class="nav flex-column flex-grow-1 mt-3">
        <li class="nav-item">
          <a class="nav-link text-white" href="dashboard.html">
            <i class="bi bi-speedometer2 me-2"></i>Dashboard
          </a>
        </li>

        <li class="nav-item mt-2">
          <a class="nav-link text-white" href="quotes.html">
            <i class="bi bi-chat-quote me-2"></i>Quotes
          </a>
        </li>

        <li class="nav-item mt-2">
          <a class="nav-link text-white" href="#">
            <i class="bi bi-heart me-2"></i>Favorites
          </a>
        </li>

        <li class="nav-item mt-2">
          <a class="nav-link text-white active" href="Authors.html">
            <i class="bi bi-person-lines-fill me-2"></i>Authors
          </a>
        </li>

        <li class="nav-item mt-2">
          <a class="nav-link text-white" href="#">
            <i class="bi bi-gear me-2"></i>Settings
          </a>
        </li>
      </ul>

      <div class="mt-auto">
        <button class="btn btn-success w-100" id="logoutBtn">
          <i class="bi bi-box-arrow-right me-2"></i>Logout
        </button>
      </div>
    </div>

    <div
      id="navbar"
      class="position-fixed top-0 d-flex justify-content-between align-items-center bg-dark text-white px-3"
    >
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-outline-success" onclick="sidebartoggle()">
          <i class="bi bi-list fs-4" role="button"></i>
        </button>

        <a href="Authors.html" class="quote" style="text-decoration: none"
          ><span class="fs-5 text-white fw-semibold">Authors</span></a
        >
      </div>

      <div class="d-flex align-items-center gap-3">
        <div class="icon-box">
          <i class="bi bi-search"></i>
        </div>

        <div class="icon-box">
          <i class="bi bi-bell"></i>
        </div>

        <img
          src="https://lh3.googleusercontent.com/a/ACg8ocLbxUEac58gizgTGvx11G9yDuaCKi5X33r8AHiqpT1MIB8wEqJY=s96-c"
          class="rounded-circle"
          width="35"
          height="35"
        />
      </div>
    </div>

    <div id="main">
      <div class="container py-4">
        <h2 class="text-center text-white mb-4">Our Authors</h2>
        <div class="row g-4" id="authors-container"></div>
      </div>
    </div>

    <script src="../JS/authors.js  "></script>
  </body>
</html>
