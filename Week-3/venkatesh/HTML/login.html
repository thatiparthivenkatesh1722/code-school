<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background:
          linear-gradient(rgba(97, 46, 46, 0.7), rgba(45, 128, 78, 0.7)),
          url("../images/loginpage.jpeg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
      }

      .quote-box {
        font-style: italic;
        font-size: 18px;
        text-align: center;
        margin-bottom: 20px;
        color: #e0f7ff;
      }

      .form-control {
        height: 55px;
        background-color: rgba(14, 218, 48, 0.24);
        border-radius: 10px;
        font-size: 20px;
      }

      .form-control:focus {
        box-shadow: none;
        outline: none;
      }

      .btn {
        height: 55px;
        font-size: 18px;
        border-radius: 10px;
      }
    </style>
  </head>

  <body class="d-flex justify-content-center align-items-center">
    <div
      class="col-11 col-sm-8 col-md-5 col-lg-4 p-4 rounded-4"
      style="background-color: rgba(170, 216, 222, 0.2)"
    >
      <h3
        class="text-center fw-bold mb-4"
        style="color: rgba(5, 247, 90, 0.801)"
      >
        Welcome Back 🙌
      </h3>

      <div class="quote-box">
        "Success is not final, failure is not fatal: It is the courage to
        continue that counts."
      </div>

      <div class="form-floating mb-3">
        <input
          type="text"
          class="form-control"
          id="username"
          placeholder="Username"
        />
        <label>Username</label>
        <small class="text-danger" id="usernameerror"></small>
      </div>

      <div class="form-floating mb-3">
        <input
          type="password"
          class="form-control"
          id="password"
          placeholder="Password"
        />
        <label>Password</label>
        <small class="text-danger" id="passworderror"></small>
      </div>
      <div>
        <button id="loginBtn" class="btn btn-primary w-100">
          <span id="btnText">Login</span>
          <span
            id="btnSpinner"
            class="spinner-border spinner-border-sm d-none"
          ></span>
        </button>
      </div>
    </div>

    <script src="../JS/login.js"></script>
  </body>
</html>
