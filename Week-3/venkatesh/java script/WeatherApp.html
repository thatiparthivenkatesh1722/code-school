<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        height: 150vh;
        transition: 0.5s;
        background-size: cover;
        background-position: center;
      }

      .weather-card {
        width: 60%;
        max-width: 400px;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.7);
        max-height: 100vh;
        overflow-y: auto;
      }

      .weather-main-icon {
        font-size: 70px;
        margin: 10px 0;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card weather-card shadow p-4 text-center">
        <h3 class="mb-3">Weather App</h3>

        <input
          type="text"
          id="city"
          class="form-control mb-3"
          placeholder="Enter city name"
        />

        <button
          id="weatherBtn"
          class="btn btn-primary w-100 mb-3"
          onclick="findWeather()"
        >
          <span id="btnText">Check Weather</span>
          <span
            id="btnSpinner"
            class="spinner-border spinner-border-sm d-none"
          ></span>
        </button>

        <div id="history" class="mb-3"></div>

        <div id="result"></div>
      </div>
    </div>

    <script>
      async function findWeather() {
        let city = document.getElementById("city").value;

        if (city.trim() === "") {
          alert("Please enter a city name");
          return;
        }

        let btnText = document.getElementById("btnText");
        let btnSpinner = document.getElementById("btnSpinner");
        let btn = document.getElementById("weatherBtn");

        btnText.style.display = "none";
        btnSpinner.classList.remove("d-none");
        btn.disabled = true;

        let apiKey = "4b91dd076a304ed4f33e82ef38fd6119";
        let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

        try {
          let response = await fetch(url);
          let weather_data = await response.json();

          if (weather_data.cod === "404" || weather_data.cod === 404) {
            document.getElementById("result").innerHTML =
              "<h4 class='text-danger'>City not found</h4>";
            return;
          }

          saveHistory(weather_data.name);
          displayHistory();

          let weatherType = weather_data.weather[0].main;

          let icon = "";
          let bg = "";

          if (weatherType === "Clear") {
            icon = "<i class='bi bi-sun-fill text-warning'></i>";
            bg = "images/clear.jpeg";
          } else if (weatherType === "Clouds") {
            icon = "<i class='bi bi-cloud-fill text-secondary'></i>";
            bg = "images/clouds.jpeg";
          } else if (weatherType === "Rain") {
            icon = "<i class='bi bi-cloud-rain-fill text-primary'></i>";
            bg = "images/rain.jpeg";
          } else if (weatherType === "Haze" || weatherType === "Mist") {
            icon = "<i class='bi bi-cloud-fog-fill text-muted'></i>";
            bg = "images/haze.jpeg";
          } else {
            icon = "<i class='bi bi-cloud-sun-fill text-warning'></i>";
            bg = "images/normal.jpeg";
          }

          document.body.style.backgroundImage = `url('${bg}')`;

          document.getElementById("result").innerHTML =
            `<h3>${weather_data.name}, ${weather_data.sys.country}</h3>
       <div class='weather-main-icon'>${icon}</div>
       <p><strong>🌡 Temperature:</strong> ${weather_data.main.temp} °C</p>
       <p><strong>☁ Weather:</strong> ${weatherType}</p>
       <p><strong>💧 Humidity:</strong> ${weather_data.main.humidity}%</p>`;
        } catch (error) {
          document.getElementById("result").innerHTML =
            "<h4 class='text-danger'>Something went wrong. please try again</h4>";
          console.error(error);
        } finally {
          btnText.style.display = "inline";
          btnSpinner.classList.add("d-none");
          btn.disabled = false;
        }
      }

      function saveHistory(city) {
        let history = JSON.parse(localStorage.getItem("cities")) || [];

        history = history.filter((c) => c.toLowerCase() !== city.toLowerCase());
        history.unshift(city);

        if (history.length > 3) {
          history.pop();
        }

        localStorage.setItem("cities", JSON.stringify(history));
      }

      function displayHistory() {
        let history = JSON.parse(localStorage.getItem("cities")) || [];

        let recent_search = "<h5>Recent Searches</h5>";

        history.forEach((city) => {
          recent_search += `<button class="btn btn-outline-secondary btn-sm m-1" onclick="quickSearch('${city}')">${city}</button>`;
        });

        document.getElementById("history").innerHTML = recent_search;
      }

      function quickSearch(city) {
        document.getElementById("city").value = city;
        findWeather();
      }

      displayHistory();
    </script>
  </body>
</html>
