<!DOCTYPE html>
<html>
<head>
    <title>JS Test</title>
</head>
<body>
<p id="results">student results</p>
<script>
let marks, grade;

marks = Number(prompt('Enter your marks'));

if (marks >= 90) {
    grade = "A";
} else if (marks >= 80) {
    grade = "B";
} else if (marks >= 70) {
    grade = "C";
} else if (marks >= 60) {
    grade = "D";
} else if (marks >= 40) {
    grade = "E";
} else {
    grade = "F";
}
document.getElementById('results').innerHTML=  "Marks: " + marks + " Grade: " + grade;
</script>

</body>
</html>
