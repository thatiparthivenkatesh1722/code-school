<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(to right, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content:center;
      }

      .login-card {
        width: 350px;
        padding: 25px;
        border-radius: 15px;
        background: white;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .error {
        color: red;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <h3 class="text-center mb-3">Login</h3>

      <form id="loginForm">
        <!-- Username OR Email -->
        <div class="mb-3">
          <label for="userInput">Username or Email</label>
          <input
            type="text"
            id="userInput"
            class="form-control"
            placeholder="Enter Username or Email"
          />
          <div id="userError" class="error"></div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Enter your Password"
          />
          <div id="passwordError" class="error"></div>
        </div>
        <!-- Date of Birth -->
        <div class="mb-3">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" class="form-control" />
          <div id="dobError" class="error"></div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#loginForm").submit(function (e) {
          e.preventDefault();

          let userInput = $("#userInput").val().trim();
          let password = $("#password").val().trim();
          let dob = $("#dob").val();

          let userError = $("#userError");
          let passwordError = $("#passwordError");
          let dobError = $("#dobError");

          // Clear errors
          userError.html("");
          passwordError.html("");
          dobError.html("");

          let isValid = true;

          // Patterns
          let emailPattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$/;
          let usernamePattern = /^[A-Za-z0-9]{4,}$/;
          let passwordPattern =
            /^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[@#$%^&*]).{6,}$/;

          // ✅ Username OR Email Validation
          if (userInput === "") {
            userError.html("Username or Email is required");
            isValid = false;
          } else if (userInput.includes("@")) {
            // Email
            if (!emailPattern.test(userInput)) {
              userError.html("Enter valid email (example@gmail.com)");
              isValid = false;
            }
          } else {
            // Username
            if (!usernamePattern.test(userInput)) {
              userError.html(
                "Username must be at least 4 characters (letters & numbers only)",
              );
              isValid = false;
            }
          }

          // ✅ Password Validation
          if (password === "") {
            passwordError.html("Password is required");
            isValid = false;
          } else if (!passwordPattern.test(password)) {
            passwordError.html(
              "Password must contain uppercase, lowercase, number & special character",
            );
            isValid = false;
          }

          // ✅ DOB Validation
          if (dob === "") {
            dobError.html("Date of Birth is required");
            isValid = false;
          } else {
            let birthDate = new Date(dob);
            let today = new Date();

            let age = today.getFullYear() - birthDate.getFullYear();
            let monthDiff = today.getMonth() - birthDate.getMonth();

            // Adjust age
            if (
              monthDiff < 0 ||
              (monthDiff === 0 && today.getDate() < birthDate.getDate())
            ) {
              age--;
            }

            if (age < 18) {
              dobError.html("You must be at least 18 years old");
              isValid = false;
            }
          }

          // ✅ Final
          if (isValid) {
            alert("Login Successful ✅");
          }
        });
      });
    </script>
  </body>
</html>
