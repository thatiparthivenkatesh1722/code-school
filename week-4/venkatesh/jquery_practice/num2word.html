<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>num-word</title>
  </head>
  <body>
    <input type="text" id="num" placeholder="Enter number....." />
    <div id="result"></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <script>
      $(document).ready(function () {
        const words = {
          ones: {
            1: "One",
            2: "Two",
            3: "Three",
            4: "Four",
            5: "Five",
            6: "Six",
            7: "Seven",
            8: "Eight",
            9: "Nine",
          },
          untilTwenty: {
            11: "Eleven",
            12: "Twelve",
            13: "Thirteen",
            14: "Fourteen",
            15: "Fifteen",
            16: "Sixteen",
            17: "Seventeen",
            18: "Eighteen",
            19: "Nineteen",
          },
          tens: {
            10: "Ten",
            20: "Twenty",
            30: "Thirty",
            40: "Forty",
            50: "Fifty",
            60: "Sixty",
            70: "Seventy",
            80: "Eighty",
            90: "Ninety",
          },
          DivisorElement: {
            10000000: "Crore",
            100000: "Lakh",
            1000: "Thousand",
            100: "Hundred",
          },
        };
        let Divisors = [10000000, 100000, 1000, 100];
        function numberToWord(num) {
          if (num === 0) return "Zero";
          else if (num < 10) {
            return words.ones[num] || "";
          } else if (num < 20 && num != 10) {
            return words.untilTwenty[num];
          } else if (num < 100) {
            let result = words.tens[Math.floor(num / 10) * 10];
            if (num % 10 !== 0) {
              result += " " + numberToWord(num % 10);
            }
            return result;
          } else if (num >= 100) {
            console.log(num);
            for (let key of Divisors) {
              if (num >= key) {
                let quotient = Math.floor(num / key);
                let remainder = num % key;
                if (remainder == 0) {
                  return (
                    numberToWord(quotient) + " " + words.DivisorElement[key]
                  );
                } else {
                  return (
                    numberToWord(quotient) +
                    " " +
                    words.DivisorElement[key] +
                    " " +
                    numberToWord(remainder)
                  );
                }
                return;
              }
            }
          } else {
            return "number must be under 1000000000 (Hundred Crores)";
          }
        }

        $("#num").on("input", function () {
          let num = parseInt($(this).val());

          if (isNaN(num)) {
            $("#result").text("");
          } else {
            $("#result").text(numberToWord(num));
          }
        });
      });
    </script>
  </body>
</html>
