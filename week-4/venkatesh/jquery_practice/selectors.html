<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <p id="hello">Hello Student</p>
    <p id="text">welciome to jQuery</p>
    <button class="btn">click me</button>
    <script>
        $(document).ready(function(){
            $(".btn").click(function(){
              $("#text").toggle(500);
            })
            $("#hello").css("cursor","pointer").click(function(){
                alert("Welcoime to den");
                })
        })
    </script>
</body>
</html>
